<!-- //Here we will learn about prompt() method in JavaScript
//The prompt() method is used to display a dialog box that prompts the user for input. It returns the input value as a string.
//Syntax: prompt(message, default)
//message: The text to display in the dialog box.
//default: The default value to display in the input field (optional).
//Example: -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <button id="prompt-btn">Show Prompt</button>
    <p id="output"></p>
    <script>
      const btn = document.getElementById("prompt-btn");
      const output = document.getElementById("output");
      btn.addEventListener("click", () => {
        const userName = prompt("What is your name?", "Guest");
        output.textContent = "Hello, " + userName + "!";
      });
    </script>
  </body>
</html>
<!-- In advance programming we will not use prompt as 
 it only responds when the user interacts with it -->
